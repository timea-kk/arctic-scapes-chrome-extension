<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arctic Scapes</title>

  <!-- Plus Jakarta Sans from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="newtab.css" />
</head>
<body>
  <!-- Background layers: current visible image + next preloading beneath -->
  <div id="bg-current" class="bg-layer" aria-hidden="true"></div>
  <div id="bg-next" class="bg-layer" aria-hidden="true"></div>

  <!-- Bottom gradient overlay for credit legibility -->
  <div class="overlay" aria-hidden="true"></div>

  <!-- TEMP: review counter -->
  <div id="review-counter" aria-hidden="true"></div>

  <!-- Main UI -->
  <main class="content">
    <!-- Clock + greeting, centred at ~45% from top -->
    <div class="center-block">
      <time id="clock" class="clock" datetime=""></time>
      <p id="greeting" class="greeting"></p>
    </div>

    <!-- Location tag + photographer credit, bottom-left -->
    <div class="bottom-left">
      <p id="location" class="location" aria-live="polite"></p>
      <p id="credit" class="credit" aria-live="polite"></p>
    </div>

    <!-- Settings, bottom-right -->
    <div class="settings-wrap" id="settings-wrap">
      <div class="settings-dropdown" id="settings-dropdown">
        <p class="settings-header">Settings</p>
        <div class="settings-row">
          <span class="settings-label">Clock</span>
          <button class="toggle" id="toggle-clock" role="switch" aria-checked="true" aria-label="Toggle clock"></button>
        </div>
        <div class="settings-row">
          <span class="settings-label">Greeting</span>
          <button class="toggle" id="toggle-greeting" role="switch" aria-checked="true" aria-label="Toggle greeting"></button>
        </div>
        <div class="settings-row">
          <span class="settings-label">Location</span>
          <button class="toggle" id="toggle-location" role="switch" aria-checked="true" aria-label="Toggle location"></button>
        </div>
      </div>
      <button class="settings-btn" id="settings-btn" aria-label="Open settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </main>

  <script type="module" src="newtab.js"></script>
</body>
</html>
